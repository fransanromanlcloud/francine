<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Colección de Películas</title>

<style>
body { font-family: sans-serif; margin:0; background:#111; color:#fff;}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}
.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}
.overlay h1 { margin:0; font-size:32px; }

/* CONTENIDO */
.container { padding: 20px; }

#buscador { margin: 10px 0; padding: 8px; width: 100%; max-width:400px; }
select { padding:8px; margin-right:10px; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
.grid img {
  width:100%;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}
.grid img:hover { transform: scale(1.05); }

/* MODALES */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:flex-start;
  overflow-y:auto;
  padding-top:40px;
  z-index:1000;
}
.modal-content {
  background:#222;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  width:90%;
  position:relative;
  margin-bottom:40px;
}
.close {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:24px;
}

button {
  padding:6px 10px;
  margin-top:10px;
  cursor:pointer;
  background:#e50914;
  color:#fff;
  border:none;
  border-radius:5px;
}

/* RESULTADOS */
#listaResultados {
  max-height:60vh;
  overflow-y:auto;
}
#listaResultados div {
  display:flex;
  align-items:center;
  justify-content: space-between;
  margin-bottom:10px;
}
#listaResultados img {
  width:70px;
  margin-right:10px;
  border-radius:5px;
}
#listaResultados span {
  flex:1;
  margin-right:10px;
}
</style>
</head>

<body>

<header class="hero">
  <img src="portada.jpg">
  <div class="overlay">
    <h1>Mi Colección</h1>
  </div>
</header>

<div class="container">
  <input type="text" id="buscador" placeholder="Buscar película... (Enter)">
  
  <select id="filtro">
    <option value="">Todos los géneros</option>
  </select>

  <select id="filtroDirector">
    <option value="">Todos los directores</option>
  </select>

  <div class="grid" id="grid"></div>
</div>

<!-- MODAL DETALLES -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 id="titulo"></h2>
    <img id="poster" style="width:100%; border-radius:8px;">
    <p id="sinopsis"></p>
    <p><b>Director:</b> <span id="director"></span></p>
    <p><b>Año:</b> <span id="anio"></span></p>
    <p><b>Actores:</b> <span id="actores"></span></p>
    <p><b>Género:</b> <span id="genero"></span></p>
    <button id="eliminarBtn">Eliminar</button>
  </div>
</div>

<!-- MODAL BUSQUEDA -->
<div id="resultadosBusqueda" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Selecciona una película</h3>
    <div id="listaResultados"></div>
  </div>
</div>

<script>
const apiKey = "506264b1629573fa7fd0f5d73ada0644";
const imgBase = "https://image.tmdb.org/t/p/w500";

const buscador = document.getElementById("buscador");
const filtro = document.getElementById("filtro");
const filtroDirector = document.getElementById("filtroDirector");
const resultadosBusqueda = document.getElementById("resultadosBusqueda");
const listaResultados = document.getElementById("listaResultados");
const modal = document.getElementById("modal");

let coleccion = [];

/* IndexedDB */
let db;
const request = indexedDB.open("PeliculasDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("peliculas", { keyPath:"id" });
};

request.onsuccess = e => {
  db = e.target.result;
  cargarColeccion();
};

/* GUARDAR */
function guardarPelicula(p){
  if(coleccion.find(x => x.id === p.id)) return;

  const tx = db.transaction("peliculas","readwrite");
  tx.objectStore("peliculas").put(p);

  coleccion.push(p);
  renderGrid();
  actualizarFiltro();
  actualizarFiltroDirector();
}

/* CARGAR */
function cargarColeccion(){
  const tx = db.transaction("peliculas","readonly");
  const req = tx.objectStore("peliculas").getAll();
  req.onsuccess = ()=>{
    coleccion = req.result;
    renderGrid();
    actualizarFiltro();
    actualizarFiltroDirector();
  };
}

/* GRID */
function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtroGenero = filtro.value;
  const filtroDir = filtroDirector.value;

  coleccion.forEach(p=>{
    const okGenero = !filtroGenero || p.genres.some(g=>g.name===filtroGenero);
    const okDirector = !filtroDir || p.director === filtroDir;

    if(okGenero && okDirector){
      const img = document.createElement("img");
      img.src = p.poster_path ? imgBase + p.poster_path : "portada.jpg";
      img.onclick = ()=>mostrarModal(p);
      grid.appendChild(img);
    }
  });
}

/* MODAL */
function mostrarModal(p){
  document.getElementById("titulo").textContent = p.title;
  document.getElementById("poster").src = imgBase+p.poster_path;
  document.getElementById("sinopsis").textContent = p.overview;
  document.getElementById("director").textContent = p.director;
  document.getElementById("anio").textContent = p.release_date?.split("-")[0];
  document.getElementById("actores").textContent = p.actors;
  document.getElementById("genero").textContent = p.genres.map(g=>g.name).join(", ");

  modal.style.display = "flex";

  document.getElementById("eliminarBtn").onclick = ()=>{
    const tx = db.transaction("peliculas","readwrite");
    tx.objectStore("peliculas").delete(p.id);

    coleccion = coleccion.filter(x=>x.id !== p.id);
    renderGrid();
    actualizarFiltro();
    actualizarFiltroDirector();

    modal.style.display = "none";
  };
}

/* CERRAR */
document.querySelector("#modal .close").onclick = ()=> modal.style.display="none";
document.querySelector("#resultadosBusqueda .close").onclick = cerrarBusqueda;

window.onclick = e=>{
  if(e.target.id==="modal") modal.style.display="none";
  if(e.target.id==="resultadosBusqueda") cerrarBusqueda();
};

function cerrarBusqueda(){
  resultadosBusqueda.style.display="none";
  listaResultados.innerHTML="";
}

/* BUSCADOR */
buscador.addEventListener("keydown", async e=>{
  if(e.key==="Enter"){
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&language=es-ES&query=${encodeURIComponent(buscador.value)}`);
    const data = await res.json();
    mostrarResultados(data.results);
  }
});

/* RESULTADOS */
function mostrarResultados(resultados){
  listaResultados.innerHTML="";

  resultados.forEach(p=>{
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${p.poster_path ? imgBase+p.poster_path : ''}">
      <span>${p.title} (${p.release_date?.split("-")[0] || "?"})</span>
      <button>Añadir</button>
    `;

    div.querySelector("button").onclick = async ()=>{

      const detalle = await fetch(`https://api.themoviedb.org/3/movie/${p.id}?api_key=${apiKey}&language=es-ES`).then(r=>r.json());
      const cred = await fetch(`https://api.themoviedb.org/3/movie/${p.id}/credits?api_key=${apiKey}&language=es-ES`).then(r=>r.json());

      const peli = {
        id: p.id,
        title: p.title,
        overview: detalle.overview,
        poster_path: p.poster_path,
        release_date: detalle.release_date,
        genres: detalle.genres || [],
        director: cred.crew?.find(c=>c.job==="Director")?.name || "Desconocido",
        actors: cred.cast?.slice(0,5).map(a=>a.name).join(", ")
      };

      guardarPelicula(peli);
      cerrarBusqueda();
    };

    listaResultados.appendChild(div);
  });

  resultadosBusqueda.style.display="flex";
}

/* FILTROS */
filtro.onchange = renderGrid;
filtroDirector.onchange = renderGrid;

function actualizarFiltro(){
  const set = new Set();
  coleccion.forEach(p=>p.genres.forEach(g=>set.add(g.name)));

  filtro.innerHTML = '<option value="">Todos</option>';
  set.forEach(g=>{
    const o = document.createElement("option");
    o.value = g;
    o.textContent = g;
    filtro.appendChild(o);
  });
}

function actualizarFiltroDirector(){
  const set = new Set();
  coleccion.forEach(p=>{ if(p.director) set.add(p.director); });

  filtroDirector.innerHTML = '<option value="">Todos los directores</option>';
  set.forEach(d=>{
    const o = document.createElement("option");
    o.value = d;
    o.textContent = d;
    filtroDirector.appendChild(o);
  });
}
</script>

</body>
</html>
