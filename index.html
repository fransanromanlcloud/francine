<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Colección de Películas</title>

<!-- Manifest y color -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e50914">

<!-- Meta viewport: fundamental para responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

#splash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#141414;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 1.5s;
}

#splash h1 {
  color:#e50914;
  font-size:32px;
  animation: zoom 1.2s ease;
}

@keyframes zoom {
  0% { transform: scale(0.5); opacity:0; }
  100% { transform: scale(1); opacity:1; }
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden; }
}

body {
  font-family: sans-serif;
  margin:0;
  background: linear-gradient(to bottom, #141414, #0b0b0b);
  color:#fff;
}

/* PORTADA / HERO */
/* PORTADA / HERO */
header.hero {
  width: 100%;
  height: 300px;
  max-height: 50vh;
  position: relative;
  overflow: hidden;
  background: #000;
}

/* 🔥 FONDO BORROSO */
header.hero::before {
  content: "";
  position: absolute;
  inset: 0;

  background-image: var(--hero-bg); /* 🔥 dinámica */
  background-size: cover;
  background-position: center;

  filter: blur(25px);
  transform: scale(1.2);
  z-index: 0;
}

/* 🖼️ IMAGEN PRINCIPAL */
header.hero img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: relative;
  z-index: 1;
  display: block;
}

/* TEXTO */
header.hero .overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  z-index: 2;
}

header.hero .overlay h1 {
  margin: 0;
  font-size: 28px;
}

/* CONTENIDO */
.container { padding: 30px 10px 10px 10px; }

/* BUSCADOR Y FILTROS */
#buscador, #btnBuscar, #filtro, #filtroDirector {
  padding:8px;
  border-radius:5px;
  border:none;
}
#btnBuscar {
  background:#e50914;
  color:white;
  margin-left:5px;
  cursor:pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.grid img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: contain;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.grid img:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 25px rgba(0,0,0,0.8);
  z-index: 2;
}

/* MEDIA QUERY MÓVIL */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(4, 1fr); /* 4 columnas fijas */
    gap: 8px;
  }

  .grid img {
    height: auto;         /* que se ajuste a la anchura */
    object-fit: contain;  /* muestra todo el póster sin recortar */
    border-radius: 8px;
  }
}

/* MODALES */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:flex-start;
  overflow-y:auto;
  padding-top:40px;
}

.modal-content {
  background: #181818;
  border-radius: 12px;
  max-width: 600px;
  width: 95%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  font-size:24px;
  cursor:pointer;
}

/* RESULTADOS BUSQUEDA */
#listaResultados { max-height:60vh; overflow-y:auto; }
#listaResultados div {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
#listaResultados img { width:70px; border-radius:5px; }
#listaResultados span { flex:1; margin:0 10px; }

#resultadosInline {
  position: absolute;
  width: calc(100% - 20px);
  max-height: 300px;
  overflow-y: auto;
  background: #181818;
  border-radius: 10px;
  margin-top: 5px;
  z-index: 1000;
  display: none;
}

#resultadosInline div {
  display: flex;
  align-items: center;
  padding: 8px;
  border-bottom: 1px solid #333;
}

#resultadosInline div:hover {
  background: #222;
}

#resultadosInline img {
  width: 50px;
  border-radius: 5px;
}

#resultadosInline span {
  flex: 1;
  margin: 0 10px;
  font-size: 14px;
}

#resultadosInline button {
  background: #e50914;
  border: none;
  color: white;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
}

/* MODAL NETFLIX */
.modal-content.netflix { padding:0; overflow:hidden; }
.banner { position: relative; height:250px; }
.banner img { width:100%; height:100%; object-fit:cover; }
.banner::after {
  content: "";
  position: absolute;
  left:0; top:0;
  width:100%; height:100%;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent 60%);
  z-index:3;
}
.degradado { position:absolute; bottom:0; width:100%; height:100%; background:linear-gradient(to top, rgba(0,0,0,1), transparent); z-index:2; }
.info { position:absolute; bottom:20px; left:20px; max-width:80%; }
.info h1 { margin:0; font-size:28px; text-shadow: 0 4px 20px rgba(0,0,0,0.9); }
.meta { color:#ddd; font-size:14px; text-shadow:0 2px 10px rgba(0,0,0,0.8); }
.contenido { padding:20px; overflow-y:auto; }
.contenido p { line-height:1.5; color:#ddd; }
#rating { font-size:18px; margin-bottom:10px; color:#ffd700; }

/* BOTÓN ELIMINAR */
#eliminarBtn {
  width:100%;
  background:#e50914;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  margin-top:20px;
  cursor:pointer;
}

@media (max-width: 600px) {

  /* 🔥 PORTADA MÁS PEQUEÑA Y MEJOR AJUSTADA */
  header.hero {
    height: 180px;
    max-height: 30vh;
  }

  header.hero img {
    object-fit: contain;   /* muestra toda la imagen */
    background: #000;      /* relleno negro elegante */
  }

  /* 🔍 BUSCADOR Y FILTROS MÁS COMPACTOS */
  #buscador, #btnBuscar, #filtro, #filtroDirector {
    height: 32px;
    padding: 4px;
    font-size: 14px;
  }

  /* 🎬 GRID MÁS OPTIMIZADO PARA MÓVIL */
  .grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .grid img {
    object-fit: contain;
  }

}

</style>
</head>

<body>

<div id="splash">
  <h1>Mi Colección</h1>
</div>

<header class="hero" id="hero">
  <img id="heroImg" src="https://raw.githubusercontent.com/fransanromanlcloud/francine/main/portada.jpg">
  <div class="overlay">
    <h1 id="heroTitulo">Mi Colección</h1>
  </div>
</header>

<div class="container">
  <input type="search" id="buscador" placeholder="Buscar película...">
  <button id="btnBuscar">🔍</button>
  <div id="resultadosInline"></div>

  <select id="filtro"><option value="">Todos los géneros</option></select>
  <select id="filtroDirector"><option value="">Todos los directores</option></select>

  <div class="grid" id="grid"></div>
</div>

<!-- MODAL NETFLIX -->
<div id="modal" class="modal">
  <div class="modal-content netflix">

    <span class="close">&times;</span>

    <div class="banner">
      <img id="backdrop">
      <div class="degradado"></div>

      <div class="info">
        <h1 id="titulo"></h1>
        <p id="meta"></p>
      </div>
    </div>

    <div class="contenido">
      <p id="rating"></p>
      <p id="sinopsis"></p>
      <p><b>Director:</b> <span id="director"></span></p>
      <p><b>Actores:</b> <span id="actores"></span></p>
      <button id="eliminarBtn">Eliminar</button>
    </div>

  </div>
</div>

<!-- MODAL BUSQUEDA -->
<div id="resultadosBusqueda" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Selecciona una película</h3>
    <div id="listaResultados"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC7EKRWcBh35dLP6PXBtGjXVTydFJ27h8Y",
  authDomain: "francine-c325d.firebaseapp.com",
  projectId: "francine-c325d"
};

firebase.initializeApp(firebaseConfig);
const dbCloud = firebase.firestore();

const apiKey = "506264b1629573fa7fd0f5d73ada0644";
const imgBase = "https://image.tmdb.org/t/p/w500";

let coleccion = [];

// Normalizar texto: minúsculas, sin tildes, sin espacios
function normalizar(str) {
  return str?.toLowerCase()
           .normalize("NFD").replace(/[\u0300-\u036f]/g,"") // quitar tildes
           .replace(/\s+/g,"") || "";
}

// GUARDAR PELÍCULA
async function guardarPelicula(p){
  if(coleccion.find(x=>x.id===p.id)) return;

  await dbCloud.collection("peliculas").doc(String(p.id)).set(p);
}

// CARGAR COLECCIÓN
async function cargarColeccion(){
  const snapshot = await dbCloud.collection("peliculas").get();

  coleccion = [];
  snapshot.forEach(doc=>{
    coleccion.push(doc.data());
  });

  renderGrid();
  actualizarFiltros();
}

function esSuperheroe(pelicula) {
  const keywords = ["superman","batman","spider-man","spiderman","iron man","avengers","thor","hulk","wonder woman","black panther","captain america","doctor strange","deadpool","x-men","guardians of the galaxy","superhero"];
  const titulo = normalizar(pelicula.title);

  // 1️⃣ Palabras clave en el título
  if (keywords.some(k => titulo.includes(normalizar(k)))) return true;

  return false;
}

function actualizarHero(pelicula){
  const hero = document.querySelector("header.hero");
  const heroImg = document.getElementById("heroImg");
  const heroTitulo = document.getElementById("heroTitulo");

  const img = pelicula.backdrop_path
    ? "https://image.tmdb.org/t/p/w780" + pelicula.backdrop_path
    : pelicula.poster_path
    ? "https://image.tmdb.org/t/p/w500" + pelicula.poster_path
    : "https://raw.githubusercontent.com/fransanromanlcloud/francine/main/portada.jpg";

  // 🖼 Imagen principal
  heroImg.src = img;

  // 🔥 FONDO BORROSO (CLAVE REAL)
  hero.style.setProperty('--hero-bg', `url(${img})`);

  // 📝 Título
  heroTitulo.textContent = pelicula.title || "Mi Colección";
}


// RENDER GRID

function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  const genero = filtro.value;
  const director = filtroDirector.value;
  const texto = buscador.value.toLowerCase();

  coleccion.sort((a, b) => a.title.localeCompare(b.title, 'es', { sensitivity: 'base' }));

  coleccion.forEach(p=>{
    // === FILTRO POR GÉNERO (INCLUYE SUPERHÉROES) ===
    let coincideGenero = !genero;

    if(genero === "superheroes"){
  coincideGenero = esSuperheroe(p);
} else if(genero){
  coincideGenero = p.genres?.some(g => normalizar(g.name) === genero);

}

    // === FILTRO POR DIRECTOR Y BÚSQUEDA ===
    const coincideDirector = !director || p.director === director;
    const coincideTexto = !texto || p.title.toLowerCase().includes(texto);

    // === SI COINCIDE TODO, LO MOSTRAMOS ===
    if(coincideGenero && coincideDirector && coincideTexto){
      const img = document.createElement("img");
      img.src = p.poster_path ? imgBase+p.poster_path : "portada.jpg";
      img.onclick = ()=>{
       mostrarModal(p);
      };
      grid.appendChild(img);
    }
  });

 }

function escucharCambios(){
  dbCloud.collection("peliculas").onSnapshot(snapshot=>{
    coleccion = [];
    snapshot.forEach(doc=>{
      coleccion.push(doc.data());
    });

    renderGrid();
    actualizarFiltros();
  });
}

escucharCambios();

// MOSTRAR MODAL NETFLIX
function mostrarModal(p){
  document.getElementById("titulo").textContent = p.title || "Desconocido";
  document.getElementById("sinopsis").textContent = p.overview || "Sin sinopsis";
  document.getElementById("rating").textContent =
    p.vote_average
      ? `⭐ ${p.vote_average.toFixed(1)} (${p.vote_count} votos)`
      : "Sin valoración";
  document.getElementById("director").textContent = p.director || "Desconocido";
  document.getElementById("actores").textContent = p.actors || "Desconocidos";
  document.getElementById("backdrop").src =
    p.backdrop_path
      ? "https://image.tmdb.org/t/p/w780"+p.backdrop_path
      : p.poster_path ? imgBase+p.poster_path : "portada.jpg";

  document.getElementById("meta").textContent =
    `${p.release_date?.split("-")[0] || ""} • ${p.genres ? p.genres.map(g=>g.name).join(", ") : ""}`;

  document.getElementById("modal").style.display="flex";

  document.getElementById("eliminarBtn").onclick = async ()=>{
    await dbCloud.collection("peliculas").doc(String(p.id)).delete();

    coleccion = coleccion.filter(x=>x.id!==p.id);
    renderGrid();
    actualizarFiltros();
    document.getElementById("modal").style.display="none";
  };
}

// CERRAR MODALES
document.querySelector("#modal .close").onclick = ()=> document.getElementById("modal").style.display="none";
document.querySelector("#resultadosBusqueda .close").onclick = cerrarBusqueda;
window.onclick = e=>{
  if(e.target.id==="modal") document.getElementById("modal").style.display="none";
  if(e.target.id==="resultadosBusqueda") cerrarBusqueda();
};
function cerrarBusqueda(){
  resultadosBusqueda.style.display="none";
  listaResultados.innerHTML="";
}

// BUSCADOR
let timeoutBusqueda;

// BUSCADOR INTELIGENTE
buscador.addEventListener("input", ()=>{
  // 1. Filtrado local instantáneo
  renderGrid();

  // 2. Búsqueda online con delay (para no saturar API)
  clearTimeout(timeoutBusqueda);

  timeoutBusqueda = setTimeout(()=>{
    buscarPeliculas();
  }, 500); // espera 0.5s después de escribir
});

// ENTER sigue funcionando
buscador.addEventListener("keydown", e=>{
  if(e.key==="Enter") buscarPeliculas();
});

async function buscarPeliculas(){
  const query = buscador.value.trim();

if(!query){
  document.getElementById("resultadosInline").style.display="none";
  return;
}

function mostrarResultados(resultados){
  const cont = document.getElementById("resultadosInline");
  cont.innerHTML="";

  if(!resultados.length){
    cont.style.display="none";
    return;
  }

  resultados.slice(0,8).forEach(p=>{ // máximo 8 resultados
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${p.poster_path ? imgBase+p.poster_path : ''}">
      <span>${p.title} (${p.release_date?.split("-")[0] || "?"})</span>
      <button>+</button>
    `;

    div.querySelector("button").onclick = async ()=>{
      const detRes = await fetch(`https://api.themoviedb.org/3/movie/${p.id}?api_key=${apiKey}&language=es-ES`);
      const credRes = await fetch(`https://api.themoviedb.org/3/movie/${p.id}/credits?api_key=${apiKey}`);

      const detalle = await detRes.json();
      const cred = await credRes.json();

      const peli = {
        id: p.id,
        title: p.title,
        overview: detalle.overview,
        poster_path: p.poster_path,
        backdrop_path: detalle.backdrop_path,
        release_date: detalle.release_date,
        genres: detalle.genres,
        director: cred.crew.find(c=>c.job==="Director")?.name || "",
        actors: cred.cast.slice(0,5).map(a=>a.name).join(", "),
        vote_average: detalle.vote_average,
        vote_count: detalle.vote_count
      };

      guardarPelicula(peli);
      cont.style.display="none";enght

      buscador.value="";
    };

    cont.appendChild(div);
  });

  cont.style.display="block";
}

  if(!query) {
    cerrarBusqueda();
    return;
  }

  const res = await fetch(
    `https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&language=es-ES&query=${encodeURIComponent(query)}`
  );

  const data = await res.json();

  mostrarResultados(data.results);
}

// MOSTRAR RESULTADOS
function mostrarResultados(resultados){
  const cont = document.getElementById("resultadosInline");
  cont.innerHTML="";

  if(!resultados.length){
    cont.style.display="none";
    return;
  }

  resultados.slice(0,8).forEach(p=>{ // máximo 8 resultados
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${p.poster_path ? imgBase+p.poster_path : ''}">
      <span>${p.title} (${p.release_date?.split("-")[0] || "?"})</span>
      <button>+</button>
    `;

    div.querySelector("button").onclick = async ()=>{
      const detRes = await fetch(`https://api.themoviedb.org/3/movie/${p.id}?api_key=${apiKey}&language=es-ES`);
      const credRes = await fetch(`https://api.themoviedb.org/3/movie/${p.id}/credits?api_key=${apiKey}`);

      const detalle = await detRes.json();
      const cred = await credRes.json();

      const peli = {
        id: p.id,
        title: p.title,
        overview: detalle.overview,
        poster_path: p.poster_path,
        backdrop_path: detalle.backdrop_path,
        release_date: detalle.release_date,
        genres: detalle.genres,
        director: cred.crew.find(c=>c.job==="Director")?.name || "",
        actors: cred.cast.slice(0,5).map(a=>a.name).join(", "),
        vote_average: detalle.vote_average,
        vote_count: detalle.vote_count
      };

      guardarPelicula(peli);
      cont.style.display="none";
      buscador.value="";
    };

    cont.appendChild(div);
  });

  cont.style.display="block";
}

// FILTROS
filtro.onchange = renderGrid;
filtroDirector.onchange = renderGrid;

function actualizarFiltros(){
  const generos = new Set();
  const directores = new Set();

  coleccion.forEach(p=>{
    // Evitar errores si no hay géneros
    if(p.genres){
      p.genres.forEach(g=>generos.add(g.name));
    }

    // Evitar errores si no hay director
    if(p.director){
      directores.add(p.director);
    }
  });

  // Añadir categoría Superhéroes manualmente
  generos.add("Superhéroes");

  // Limpiar selects
  filtro.innerHTML = '<option value="">Géneros</option>';
  filtroDirector.innerHTML = '<option value="">Directores</option>';

  // Ordenar géneros alfabéticamente
  [...generos]
  .sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'}))
  .forEach(g=>{
    const o = document.createElement("option");
    o.value = normalizar(g);  // normalizamos el valor
    o.textContent = g;
    filtro.appendChild(o);
  });

  // Ordenar directores alfabéticamente
  [...directores]
    .sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'}))
    .forEach(d=>{
      const o = document.createElement("option");
      o.value = d;
      o.textContent = d;
      filtroDirector.appendChild(o);
    });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("Service Worker activo"))
    .catch(err => console.log("Error SW:", err));
}

document.addEventListener("click", (e)=>{
  if(!e.target.closest("#buscador") && !e.target.closest("#resultadosInline")){
    document.getElementById("resultadosInline").style.display="none";
  }
});

cargarColeccion();

const hero = document.querySelector("header.hero");
const heroImg = document.getElementById("heroImg");

// usar la misma imagen del hero
hero.style.setProperty('--hero-bg', `url(${heroImg.src})`);

</script>

</body>
</html>
